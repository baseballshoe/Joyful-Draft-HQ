name: Pull Yahoo stats

# Runs the Yahoo Fantasy stats pull twice daily. Sequenced AFTER all other
# stat sources so it overwrites with authoritative Yahoo values last,
# matching the Coach context.ts SOURCE_PRIORITY.
#
# v1.5.1.3: also refreshes Yahoo rosters + waivers caches via the
# /api/yahoo/all?force=1 endpoint at the end of the run.
# v1.5.1.4: TWICE-DAILY pulls so users have fresh data by 5 AM ET.
#
# Schedule (UTC):
#   First cascade:  09:45 UTC = 4:45 AM EST / 5:45 AM EDT
#   Second cascade: 13:45 UTC = 8:45 AM EST / 9:45 AM EDT
#
# Why twice daily: West Coast late games can finish past 1 AM ET, and
# Yahoo's overnight processing window can extend past 4 AM ET. The
# second cascade catches anything the first missed. Cost is zero —
# GitHub Actions on public repos = unlimited minutes.

on:
  schedule:
    - cron: '45 9 * * *'   # First cascade
    - cron: '45 13 * * *'  # Second cascade
  workflow_dispatch:

jobs:
  pull-yahoo-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run pull_yahoo_stats.ts (player stats)
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          YAHOO_CLIENT_ID:     ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          APP_BASE_URL:        ${{ secrets.APP_BASE_URL }}
        run: npx tsx scripts/pull_yahoo_stats.ts

      - name: Force-refresh Yahoo league cache (rosters, waivers, etc)
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          echo "Triggering force-refresh of Yahoo league cache..."
          # Hit /api/yahoo/all?force=1 to refresh:
          # settings, standings, scoreboard, rosters, waivers:B, waivers:P
