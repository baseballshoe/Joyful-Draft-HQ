name: Pull Yahoo stats

# Runs the Yahoo Fantasy stats pull nightly. Sequenced AFTER all other
# stat sources so it overwrites with authoritative Yahoo values last,
# matching the Coach context.ts SOURCE_PRIORITY (yahoo wins for league
# scored categories).
#
# v1.5.1.3: also refreshes Yahoo rosters + waivers caches via the
# /api/yahoo/all?force=1 endpoint at the end of the run. This guarantees
# Coach has fresh roster/waiver data daily even if no users are active
# during the day.
#
# Schedule:
#   06:00 UTC — pull-players       (MLB rosters + IDs)
#   06:15 UTC — pull-basic-stats   (MLB Stats API basics for all)
#   06:30 UTC — pull-stats         (FanGraphs + Savant advanced)
#   06:45 UTC — pull-yahoo-stats   (this — Yahoo authoritative + cache refresh)

on:
  schedule:
    - cron: '45 6 * * *'
  workflow_dispatch:

jobs:
  pull-yahoo-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run pull_yahoo_stats.ts (player stats)
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          YAHOO_CLIENT_ID:     ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          APP_BASE_URL:        ${{ secrets.APP_BASE_URL }}
        run: npx tsx scripts/pull_yahoo_stats.ts

      - name: Force-refresh Yahoo league cache (rosters, waivers, etc)
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          echo "Triggering force-refresh of Yahoo league cache..."
          # Hit /api/yahoo/all?force=1 to refresh:
          # settings, standings, scoreboard, rosters, waivers:B, waivers:P
          # The endpoint is public-facing and uses the stored OAuth token.
          # If it fails, log but don't fail the workflow — the next user
          # request will trigger a refresh anyway.
          response=$(curl -s -o /tmp/cache_response.json -w "%{http_code}" \
            "${APP_BASE_URL}/api/yahoo/all?force=1" || echo "000")
          echo "HTTP status: $response"
          if [ "$response" = "200" ]; then
            echo "✓ Yahoo cache refreshed successfully"
            head -c 500 /tmp/cache_response.json
          else
            echo "⚠ Cache refresh returned status $response (non-fatal)"
            head -c 500 /tmp/cache_response.json || true
          fi
