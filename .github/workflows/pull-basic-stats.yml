name: Pull basic stats

# Runs the MLB Stats API basic-stats backfill nightly. Sequenced
# between pull-players (06:00 UTC, populates MLBAM IDs) and
# pull-stats (06:30 UTC, scrapes Savant + FanGraphs advanced metrics).
#
# This script gives Coach baseline counting + rate stats for every
# active MLB player — including QS, ERA, WHIP, K/9, BB/9 for pitchers
# and AVG/OBP/SLG/HR/SB/BB/K for batters — even when the Statcast
# scrapes haven't caught up with recent debuts.

on:
  schedule:
    # Daily at 06:15 UTC (15 min after pull-players, 15 min before pull-stats)
    - cron: '15 6 * * *'
  workflow_dispatch:

jobs:
  pull-basic-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests

      - name: Run pull_basic_stats.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/pull_basic_stats.py
