name: Pull Stats

# Runs the FanGraphs + Baseball Savant advanced stats scrape twice daily.
#
# v1.5.1.4: TWICE-DAILY pulls so users have fresh data by 5 AM ET.
#
# Schedule (UTC):
#   First cascade:  09:30 UTC = 4:30 AM EST / 5:30 AM EDT
#   Second cascade: 13:30 UTC = 8:30 AM EST / 9:30 AM EDT
#
# Also can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '30 9 * * *'   # First cascade
    - cron: '30 13 * * *'  # Second cascade
  workflow_dispatch:  # Manual trigger button

jobs:
  pull-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run stats pull
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python scripts/pull_stats.py
