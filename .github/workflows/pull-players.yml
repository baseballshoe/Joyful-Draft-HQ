name: Pull MLB players

# Runs the active-MLB-player roster seed nightly. This MUST run BEFORE
# pull_stats.py so that newly-debuted players exist in our DB with their
# MLBAM IDs in player_ids — otherwise the stats pipeline can't match
# them and Coach gets "no stats for this player".
#
# v1.5.1.4: TWICE-DAILY pulls so users have fresh data by 5 AM ET.
#
# Schedule (UTC):
#   First cascade (early — captures Yahoo's overnight processing):
#     09:00 UTC = 4:00 AM EST / 5:00 AM EDT — pull-players (this)
#     09:15 UTC = 4:15 AM EST / 5:15 AM EDT — pull-basic-stats
#     09:30 UTC = 4:30 AM EST / 5:30 AM EDT — pull-stats
#     09:45 UTC = 4:45 AM EST / 5:45 AM EDT — pull-yahoo-stats
#
#   Second cascade (safety net — catches any West Coast late games or
#   Yahoo processing delays):
#     13:00 UTC = 8:00 AM EST / 9:00 AM EDT — pull-players (this)
#     13:15 UTC = 8:15 AM EST / 9:15 AM EDT — pull-basic-stats
#     13:30 UTC = 8:30 AM EST / 9:30 AM EDT — pull-stats
#     13:45 UTC = 8:45 AM EST / 9:45 AM EDT — pull-yahoo-stats

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC (first cascade)
    - cron: '0 13 * * *'  # 13:00 UTC (second cascade)
  workflow_dispatch:   # allow manual trigger from the Actions UI

jobs:
  pull-players:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests

      - name: Run pull_players.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/pull_players.py
