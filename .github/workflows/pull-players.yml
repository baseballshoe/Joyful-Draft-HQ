name: Pull MLB players

# Runs the active-MLB-player roster seed nightly. This MUST run BEFORE
# pull_stats.py so that newly-debuted players exist in our DB with their
# MLBAM IDs in player_ids — otherwise the stats pipeline can't match
# them and Coach gets "no stats for this player".
#
# Schedule: 06:00 UTC = 02:00 ET. Runs ~30 min before pull-stats.yml
# (which is presumably scheduled at 06:30 UTC). Adjust the cron in
# pull-stats.yml if you want them further apart.

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:   # allow manual trigger from the Actions UI

jobs:
  pull-players:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests

      - name: Run pull_players.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/pull_players.py
